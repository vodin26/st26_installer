name: CI/CD Pipeline to Yandex.Disk

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  YANDEX_BASE_FOLDER: ${{ secrets.YANDEX_BASE_FOLDER || 'github_deployments' }}

jobs:
  test:
    name: Run BATS tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: false
        
    - name: Clean submodule artifacts
      run: |
        git submodule deinit -f . || true
        rm -rf .git/modules/* || true
        
    - name: Install BATS
      run: |
        sudo apt-get update
        sudo apt-get install -y bats
        
    - name: Make scripts executable
      run: |
        chmod +x installer.sh
        [ -f "test_installer.bats" ] && chmod +x test_installer.bats || true
        
    - name: Execute tests
      run: |
        echo "Running BATS tests..."
        if [ -f "test_installer.bats" ]; then
          bats test_installer.bats || (echo "Tests failed" && exit 1)
        else
          echo "No BATS tests found, skipping"
        fi

  deploy:
    name: Deploy to Yandex.Disk
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup WebDAV environment
      env:
        YANDEX_USER: ${{ secrets.YANDEX_USER }}
        YANDEX_PASSWORD: ${{ secrets.YANDEX_PASSWORD }}
      run: |
        echo "Setting up WebDAV connection..."
        sudo apt-get update -qq
        sudo apt-get install -yqq davfs2
        
        sudo mkdir -p /mnt/yandex_disk
        sudo chown -R $USER:$USER /mnt/yandex_disk
        
        echo "https://webdav.yandex.ru $YANDEX_USER $YANDEX_PASSWORD" | sudo tee /etc/davfs2/secrets
        sudo chmod 600 /etc/davfs2/secrets
        
        for i in {1..3}; do
          if sudo mount -t davfs https://webdav.yandex.ru /mnt/yandex_disk -o noexec,uid=$(id -u),gid=$(id -g); then
            echo "Mounted successfully on attempt $i"
            break
          else
            echo "Mount attempt $i failed"
            sleep 5
          fi
        done
        
        if ! mountpoint -q /mnt/yandex_disk; then
          echo "::error::Failed to mount Yandex.Disk"
          exit 1
        fi
        
    - name: Prepare deployment
      run: |
        # Получаем время в UTC+3
        DEPLOY_TIME=$(date -d "+3 hours" +"%Y-%m-%d_%H-%M-%S")
        
        # Формируем путь
        DEPLOY_DIR="/mnt/yandex_disk/$YANDEX_BASE_FOLDER/deploy_${DEPLOY_TIME}"
        
        mkdir -p "$DEPLOY_DIR"
        
        # Копируем основные файлы
        echo "Копируем основные файлы..."
        [ -f "installer.sh" ] && cp -v installer.sh "$DEPLOY_DIR/"
        [ -f "test_installer.bats" ] && cp -v test_installer.bats "$DEPLOY_DIR/"
        [ -f "README.md" ] && cp -v README.md "$DEPLOY_DIR/"
        
        # Копируем директории с плагинами и синтезаторами
        echo "Копируем директории с ресурсами..."
        
        if [ -d "synth" ]; then
          echo "✅ Найдена директория synth, копируем..."
          cp -rv synth "$DEPLOY_DIR/"
        else
          echo "⚠️ Директория synth не найдена"
        fi
        
        if [ -d "processing" ]; then
          echo "✅ Найдена директория processing, копируем..."
          cp -rv processing "$DEPLOY_DIR/"
        else
          echo "⚠️ Директория processing не найдена"
        fi
        
        if [ -d "tools" ]; then
          echo "✅ Найдена директория tools, копируем..."
          cp -rv tools "$DEPLOY_DIR/"
        else
          echo "⚠️ Директория tools не найдена"
        fi
        
        # Создаем файл с информацией о деплое
        echo "Deployment time (UTC+3): ${DEPLOY_TIME}" > "$DEPLOY_DIR/deployment_info.txt"
        echo "Commit: $GITHUB_SHA" >> "$DEPLOY_DIR/deployment_info.txt"
        echo "Workflow: $GITHUB_RUN_ID" >> "$DEPLOY_DIR/deployment_info.txt"
        
        # Сохраняем структуру скопированных файлов для отладки
        echo -e "\nСтруктура деплоя:" >> "$DEPLOY_DIR/deployment_info.txt"
        ls -la "$DEPLOY_DIR/" >> "$DEPLOY_DIR/deployment_info.txt"
        
        if [ -d "$DEPLOY_DIR/synth" ]; then
          echo -e "\nСодержимое synth:" >> "$DEPLOY_DIR/deployment_info.txt"
          ls -la "$DEPLOY_DIR/synth/" >> "$DEPLOY_DIR/deployment_info.txt"
        fi
        
        if [ -d "$DEPLOY_DIR/processing" ]; then
          echo -e "\nСодержимое processing:" >> "$DEPLOY_DIR/deployment_info.txt"
          ls -la "$DEPLOY_DIR/processing/" >> "$DEPLOY_DIR/deployment_info.txt"
        fi
        
        if [ -d "$DEPLOY_DIR/tools" ]; then
          echo -e "\nСодержимое tools:" >> "$DEPLOY_DIR/deployment_info.txt"
          ls -la "$DEPLOY_DIR/tools/" >> "$DEPLOY_DIR/deployment_info.txt"
        fi
        
        echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
        echo "::notice::Files deployed to $DEPLOY_DIR"
        
    - name: Verify deployment
      run: |
        echo "Проверка деплоя..."
        
        # Проверка наличия основных файлов
        [ ! -f "$DEPLOY_DIR/installer.sh" ] && echo "::error::Main installer file missing" && exit 1
        echo "✅ installer.sh присутствует"
        
        # Проверка наличия директорий
        if [ -d "$DEPLOY_DIR/synth" ]; then
          echo "✅ synth директория присутствует"
        else
          echo "⚠️ synth директория отсутствует"
        fi
        
        if [ -d "$DEPLOY_DIR/processing" ]; then
          echo "✅ processing директория присутствует"
        else
          echo "⚠️ processing директория отсутствует"
        fi
        
        if [ -d "$DEPLOY_DIR/tools" ]; then
          echo "✅ tools директория присутствует"
        else
          echo "⚠️ tools директория отсутствует"
        fi
        
        echo "Деплой проверен успешно"

    - name: Unmount Yandex.Disk
      if: always()
      run: |
        if mountpoint -q /mnt/yandex_disk; then
          sudo umount /mnt/yandex_disk || echo "Unmount failed"
        fi
        sudo rm -f /etc/davfs2/secrets

  healthcheck:
    name: Post-Deployment Healthcheck
    needs: deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup test environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bats
        chmod +x installer.sh || true
      
    - name: Mount Yandex.Disk
      env:
        YANDEX_USER: ${{ secrets.YANDEX_USER }}
        YANDEX_PASSWORD: ${{ secrets.YANDEX_PASSWORD }}
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yqq davfs2
        sudo mkdir -p /mnt/yandex_hc
        echo "https://webdav.yandex.ru $YANDEX_USER $YANDEX_PASSWORD" | sudo tee /etc/davfs2/secrets
        sudo chmod 600 /etc/davfs2/secrets
        
        if ! sudo mount -t davfs https://webdav.yandex.ru /mnt/yandex_hc -o noexec,uid=$(id -u),gid=$(id -g); then
          echo "::error::Failed to mount for healthcheck"
          exit 1
        fi
        
    - name: Find latest deployment
      run: |
        DEPLOY_DIR=$(ls -td /mnt/yandex_hc/$YANDEX_BASE_FOLDER/deploy_* | head -1)
        if [ -z "$DEPLOY_DIR" ]; then
          echo "::error::No deployments found"
          exit 1
        fi
        echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
        
    - name: Run healthchecks
      run: |
        echo "Running healthchecks on $DEPLOY_DIR"
        
        # Проверка наличия обязательных файлов
        echo "Проверка основных файлов..."
        [ ! -f "$DEPLOY_DIR/installer.sh" ] && echo "::error::Installer missing" && exit 1
        echo "✅ installer.sh найден"
        
        [ ! -f "$DEPLOY_DIR/README.md" ] && echo "::warning::README missing"
        
        # Проверка наличия ресурсных директорий
        echo "Проверка ресурсных директорий..."
        
        if [ -d "$DEPLOY_DIR/synth" ]; then
          echo "✅ synth директория найдена"
          # Проверка конкретных файлов для Vital
          if [ -f "$DEPLOY_DIR/synth/vital/vital" ]; then
            echo "  ✅ vital файл найден"
          else
            echo "  ⚠️ vital файл не найден"
          fi
        else
          echo "⚠️ synth директория не найдена"
        fi
        
        if [ -d "$DEPLOY_DIR/processing" ]; then
          echo "✅ processing директория найдена"
          # Проверка конкретных файлов
          if [ -d "$DEPLOY_DIR/processing/AllGVSTLinux64" ]; then
            echo "  ✅ AllGVSTLinux64 директория найдена"
          else
            echo "  ⚠️ AllGVSTLinux64 не найдена"
          fi
        else
          echo "⚠️ processing директория не найдена"
        fi
        
        if [ -d "$DEPLOY_DIR/tools" ]; then
          echo "✅ tools директория найдена"
        else
          echo "⚠️ tools директория не найдена"
        fi
        
        # Проверка контрольных сумм для installer.sh
        LOCAL_HASH=$(sha256sum installer.sh | cut -d' ' -f1)
        REMOTE_HASH=$(sha256sum "$DEPLOY_DIR/installer.sh" | cut -d' ' -f1)
        
        if [ "$LOCAL_HASH" == "$REMOTE_HASH" ]; then
          echo "✅ Контрольная сумма installer.sh совпадает"
        else
          echo "::error::Checksum mismatch for installer.sh"
          exit 1
        fi
        
        # Проверка синтаксиса
        if bash -n "$DEPLOY_DIR/installer.sh"; then
          echo "✅ Синтаксис installer.sh корректен"
        else
          echo "::error::Syntax error in deployed installer"
          exit 1
        fi
        
        # Запуск тестов (если есть)
        if [ -f "$DEPLOY_DIR/test_installer.bats" ]; then
          echo "Running BATS tests..."
          if ! command -v bats >/dev/null 2>&1; then
            echo "::error::BATS not installed in healthcheck environment"
            exit 1
          fi
          bats "$DEPLOY_DIR/test_installer.bats" || exit 1
          echo "✅ BATS тесты пройдены"
        else
          echo "No BATS tests found in deployment, skipping"
        fi
        
        echo "✅ Все healthchecks пройдены успешно!"
        
    - name: Unmount Yandex.Disk
      if: always()
      run: |
        if mountpoint -q /mnt/yandex_hc; then
          sudo umount /mnt/yandex_hc || true
        fi
        sudo rm -f /etc/davfs2/secrets